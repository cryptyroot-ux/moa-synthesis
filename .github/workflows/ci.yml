name: skill-ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skill package
        run: python3 scripts/validate_skill.py
      - name: Syntax check scripts and tests
        run: python3 -m py_compile scripts/*.py tests/*.py
      - name: Run gate benchmark
        run: python3 scripts/eval_gate.py
      - name: Run regression tests
        run: python3 tests/test_regressions.py
